services:
    _defaults:
        public: false
        autowire: false
        autoconfigure: false

    F0ska\AutoGridTestBundle\:
        resource: '../src/{Controller/*,DataFixtures/*,EventSubscriber/*,Repository/*,Service/*,Twig/*}'
        autowire: true
        autoconfigure: true

    F0ska\AutoGridTestBundle\Customization\:
        resource: '../src/Customization/*'
        tags: [ { name: 'autogrid.customization', priority: 0 } ]
        autowire: true
        public: true

    F0ska\AutoGridTestBundle\View\:
        resource: '../src/View/*'
        tags: [ 'autogrid.view_service' ]
        autowire: true
        public: true
