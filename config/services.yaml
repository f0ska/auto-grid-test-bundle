services:
    _defaults:
        public: false
        autowire: false
        autoconfigure: false

    F0ska\AutoGridTestBundle\:
        resource: '../src/{Controller/*,DataFixtures/*,EventSubscriber/*,Repository/*,Service/*,Twig/*}'
        autowire: true
        autoconfigure: true

    F0ska\AutoGridTestBundle\Customization\:
        resource: '../src/Customization/*'
        tags: [ 'autogrid.customization' ]
        autowire: true
        public: true
